version: 2

project_name: mxscript

before:
  hooks:
    - go mod tidy

builds:
  - id: mx
    binary: mx
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  - id: default
    name_template: >-
      mx_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - docs/**

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: jlkdevelop
    name: mxscript
  draft: false
  prerelease: auto
  header: |
    # MX Script {{ .Tag }}

    Founded by [Jassim Alkharafi](https://github.com/jlkdevelop).
