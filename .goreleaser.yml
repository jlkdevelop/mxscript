version: 2

project_name: mxscript

before:
  hooks:
    - go mod tidy
    # Package the VS Code extension into a .vsix so it can ship as a
    # release asset. Falls through quietly if Node / npx isn't available
    # (e.g. on the local dev machine).
    - sh -c 'cd extras/vscode && npx --yes @vscode/vsce package --out ../../dist/mxscript-{{ trimprefix .Version "v" }}.vsix || true'

builds:
  - id: mx
    binary: mx
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  - id: default
    name_template: >-
      mx_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - docs/**

# Attach the VS Code extension .vsix (built by the `before:` hook) as a
# standalone release asset so users can `code --install-extension <url>`.
extra_files:
  - glob: dist/mxscript-*.vsix

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: jlkdevelop
    name: mxscript
  draft: false
  prerelease: auto
  header: |
    # MX Script {{ .Tag }}

    Founded by [Jassim Alkharafi](https://github.com/jlkdevelop).

# Auto-bump the Homebrew formula on every tag.
#
# Setup (one-time): create a PAT with `repo` scope (or a fine-grained token
# scoped to jlkdevelop/homebrew-tap with Contents: write) and add it to this
# repo's Actions secrets as HOMEBREW_TAP_TOKEN. The release workflow already
# passes it through as an env var. When the secret is unset the brews push
# is skipped automatically — the regular GitHub release still ships.
brews:
  - name: mx
    repository:
      owner: jlkdevelop
      name: homebrew-tap
      branch: main
      token: '{{ envOrDefault "HOMEBREW_TAP_TOKEN" "" }}'
    directory: Formula
    homepage: https://mxscript.com
    description: "Modern open-source scripting language for building web apps and APIs"
    license: "MIT"
    skip_upload: '{{ eq (envOrDefault "HOMEBREW_TAP_TOKEN" "") "" }}'
    commit_author:
      name: Jassim Alkharafi
      email: jlkdevelop@gmail.com
    test: |
      assert_match version.to_s, shell_output("#{bin}/mx version")
